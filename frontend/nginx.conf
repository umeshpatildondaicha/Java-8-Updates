server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
    }

    location /files/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
